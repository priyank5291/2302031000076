<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRLingua - Language Learning Platform</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background-color: #f5f5f5;
            height: 100vh;
        }
        
        /* Header Styles */
        header {
            height: 10vh;
            background-color: #4a8c94;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        
        .logo {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            margin-right: 5px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a9aa9;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
        }
        
        nav ul {
            display: flex;
            list-style: none;
        }
        
        nav ul li {
            margin-left: 20px;
        }
        
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
        
        .sign-up-btn {
            background-color: white;
            color: #4a8c94;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
        }
        
        /* Tool Grid Styles */
        .tools-grid {
            height: 55vh;
            max-width: 800px;
            margin: 20px auto;
            background-color: #333;
            border-radius: 15px;
            overflow: hidden;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }
        
        .tool-item {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            border: 1px solid #444;
        }
        
        .tool-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .tool-name {
            font-size: 14px;
        }
        
        /* Footer Styles */
        footer {
            height: 33vh;
            background: linear-gradient(135deg, #347780 0%, #1d4146 100%);
            padding: 30px 50px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
        }

        .footer-logo {
            grid-column: 1;
            display: flex;
            align-items: flex-start;
        }

        .footer-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-column: 2 / 4;
            gap: 20px;
        }

        .link-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-info {
            grid-column: 4;
            text-align: right;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin-bottom: 10px;
            display: block;
        }

        .social-icons {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }

        .social-icon {
            width: 30px;
            height: 30px;
            background-color: white;
            color: #387e87;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .copyright {
            height: 7vh;
            background-color: #387e87;
            padding: 15px 50px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copyright p {
            font-size: 14px;
        }

        .footer-brand {
            display: flex;
            align-items: center;
        }
        .footer-copyright{
            color: white;
        }
        
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <div class="logo-icon">VR</div>
            VRLingua
        </div>
        
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="./Languages.html">Languages</a></li>
                <li><a href="./Community.html">Community</a></li>
                <li><a href="./Tools.html">Tools</a></li>
                <a href="./sign-up.html" class="sign-up-btn">Sign up</a>
            </ul>
           

        </nav>
    </header>
    
    <!-- Tools Grid -->
    <div class="tools-grid">
        <!-- Row 1 -->
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="5" width="15" height="15" stroke="white" stroke-width="2"/>
                    <text x="8" y="16" fill="white" font-size="8">A</text>
                    <text x="13" y="14" fill="white" font-size="8">Ā</text>
                </svg>
            </div>
            <div class="tool-name">Translate</div>
        </div>
        
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <text x="5" y="20" fill="white" font-size="14">Abc</text>
                    <path d="M5 25 L25 5" stroke="white" stroke-width="2"/>
                </svg>
            </div>
            <div class="tool-name">Correction</div>
        </div>
        
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 8 C15 5, 20 15, 25 8" stroke="white" stroke-width="2" fill="none"/>
                    <path d="M5 15 L5 20 L10 20 L10 15 Z" stroke="white" stroke-width="2"/>
                </svg>
            </div>
            <div class="tool-name">Speak</div>
        </div>
        
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <text x="8" y="20" fill="white" font-size="14">wén</text>
                </svg>
            </div>
            <div class="tool-name">Transliteration</div>
        </div>
        
        <!-- Row 2 -->
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 10 C12 5, 18 5, 20 10 L20 15 L10 15 Z" stroke="white" stroke-width="2" fill="none"/>
                    <circle cx="23" cy="12" r="3" stroke="white" stroke-width="1" fill="none"/>
                    <text x="22" y="14" fill="white" font-size="6">$</text>
                </svg>
            </div>
            <div class="tool-name">Reply</div>
        </div>
        
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="8" y="8" width="12" height="12" stroke="white" stroke-width="2" fill="none"/>
                    <rect x="12" y="12" width="12" height="12" stroke="white" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <div class="tool-name">Copy</div>
        </div>
        
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 8 L20 8 L20 20 L15 15 L10 20 Z" stroke="white" stroke-width="2" fill="none"/>
                </svg>
            </div>
            <div class="tool-name">Favorite</div>
        </div>
        
        <div class="tool-item">
            <div class="tool-icon">
                <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="10" y1="10" x2="15" y2="10" stroke="white" stroke-width="2"/>
                    <line x1="10" y1="15" x2="20" y2="15" stroke="white" stroke-width="2"/>
                    <line x1="10" y1="20" x2="18" y2="20" stroke="white" stroke-width="2"/>
                    <path d="M18 9 L20 11 L22 7" stroke="white" stroke-width="1" fill="none"/>
                    <path d="M21 14 L23 16 L25 12" stroke="white" stroke-width="1" fill="none"/>
                </svg>
            </div>
            <div class="tool-name">More</div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer>
        <div class="footer-logo">
            <div class="logo">
                <div class="logo-icon">VR</div>
                VRLingua
            </div>
        </div>
        
        <div class="footer-links">
            <div class="link-column">
                <a href="./index.html">Home</a>
                <a href="./Languages.html">Languages</a>
                <a href="./Tools.html">Tools</a>
                <a href="./About-us.html">Explore</a>
                <a href="./Pricing Plans.html">Events</a>
            </div>
            
            <div class="link-column">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="./About-us.html">About Us</a>
                <a href="./Community.html">Community</a>
                <a href="./About-us.html">Contact Us</a>
            </div>
        </div>
        
        <div class="footer-copyright">
            <p>©VRLingua|All Rights Reserved</p>
          
         
    </footer>
</body>
</html>
